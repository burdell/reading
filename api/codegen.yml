overwrite: true
generates:
  generated/client-graphql.ts:
    schema: ./netlify/functions/graphql/schema.graphql
    plugins:
      - 'typescript-resolvers'
      - 'typescript'
  ../frontend/app/generated/graphql.ts:
    schema: ./netlify/functions/graphql/schema.graphql
    documents: ../frontend/app/**/*.graphql
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-react-query'
  generated/hasura-graphql.ts:
    schema:
      - 'https://humane-civet-22.hasura.app/v1/graphql':
          headers:
            x-hasura-admin-secret: ${HASURA_GRAPHQL_ADMIN_SECRET}
    plugins:
      - 'typescript'
